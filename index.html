<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Org Charts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f7f5f0;
    min-height: 100vh;
    padding: 60px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 60px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #2c2c2c;
    margin-bottom: 8px;
  }

  header p {
    font-size: 13px;
    color: #8a7e6e;
    letter-spacing: 0.1em;
  }

  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .chart-card {
    background: #fff;
    border-radius: 14px;
    padding: 28px 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    text-decoration: none;
    color: inherit;
    border-top: 4px solid #c9a96e;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }

  .chart-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.11);
  }

  .chart-card .card-icon { font-size: 22px; margin-bottom: 4px; }
  .chart-card h2 { font-family: 'Playfair Display', serif; font-size: 17px; color: #2c2c2c; }
  .chart-card p  { font-size: 12px; color: #8a7e6e; }
  .chart-card .arrow { margin-top: auto; padding-top: 16px; font-size: 18px; color: #c9a96e; }

  .card-delete {
    position: absolute;
    top: 12px; right: 14px;
    background: none; border: none;
    font-size: 16px; color: #ddd;
    cursor: pointer; transition: color 0.15s;
    line-height: 1;
  }
  .card-delete:hover { color: #e07070; }

  /* New chart card */
  .new-card {
    border-radius: 14px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    background: transparent;
    border: 2px dashed #d5cfc6;
    transition: border-color 0.2s, background 0.2s;
    text-align: center;
    min-height: 160px;
  }
  .new-card:hover { border-color: #c9a96e; background: #fdf9f3; }
  .new-card .plus { font-size: 28px; color: #c9a96e; }
  .new-card span  { font-size: 13px; color: #8a7e6e; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%; max-width: 440px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  .modal h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: #2c2c2c; margin-bottom: 6px; }
  .modal .modal-sub { font-size: 12px; color: #8a7e6e; margin-bottom: 24px; }

  .modal label {
    display: block;
    font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: #8a7e6e;
    margin-bottom: 6px; margin-top: 16px;
  }

  .modal input {
    width: 100%;
    border: 1px solid #e0dbd3; border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: #2c2c2c;
    outline: none; transition: border-color 0.2s;
  }
  .modal input:focus { border-color: #c9a96e; }

  .url-note {
    font-size: 11px; color: #aaa;
    margin-top: 6px; line-height: 1.5;
  }

  .modal-actions {
    display: flex; gap: 10px; margin-top: 28px;
  }

  .btn-primary {
    flex: 1; background: #c9a96e; color: #fff;
    border: none; border-radius: 8px; padding: 11px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-primary:hover { background: #b8944f; }

  .btn-secondary {
    background: none; border: 1px solid #d5cfc6;
    border-radius: 8px; padding: 11px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: #8a7e6e;
    cursor: pointer; transition: border-color 0.2s;
  }
  .btn-secondary:hover { border-color: #b0a898; }

  /* Color cycling */
  .chart-card:nth-child(4n+1) { border-top-color: #c9a96e; }
  .chart-card:nth-child(4n+2) { border-top-color: #7a9e87; }
  .chart-card:nth-child(4n+3) { border-top-color: #7a8ea8; }
  .chart-card:nth-child(4n)   { border-top-color: #a87a8e; }
</style>
</head>
<body>

<header>
  <h1>Organization Charts</h1>
  <p>Select a chart to view or edit</p>
</header>

<div class="charts-grid" id="charts-grid">
  <div class="new-card" onclick="openNewModal()">
    <div class="plus">+</div>
    <span>Create New Chart</span>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>New Org Chart</h2>
    <p class="modal-sub">Fill in the details below to create a new chart</p>

    <label>Chart Name</label>
    <input type="text" id="new-name" placeholder="e.g. Acme Corp" />

    <label>Description (optional)</label>
    <input type="text" id="new-desc" placeholder="e.g. Q1 2026 Structure" />

    <label>Google Apps Script URL</label>
    <input type="text" id="new-url"
      value="https://script.google.com/macros/s/AKfycbzu7aCDAfUvVV-EgQcBw4WHN6YMCgm4Jyca5YH72TxpkBQrSCIw-coPpma9pETp_1ULtg/exec"
      placeholder="https://script.google.com/macros/s/…/exec" />
    <p class="url-note">Default URL is pre-filled. Replace only if using a different Google Sheet.</p>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary"   onclick="createChart()">Create Chart →</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY  = 'orgcharts_index_v2';
  const DEFAULT_URL  = 'https://script.google.com/macros/s/AKfycbzu7aCDAfUvVV-EgQcBw4WHN6YMCgm4Jyca5YH72TxpkBQrSCIw-coPpma9pETp_1ULtg/exec';

  function getCharts() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch(e) { return []; }
  }

  function saveCharts(charts) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(charts));
  }

  function renderCharts() {
    const charts  = getCharts();
    const grid    = document.getElementById('charts-grid');
    const newCard = grid.querySelector('.new-card');
    grid.querySelectorAll('.chart-card').forEach(c => c.remove());

    charts.forEach(chart => {
      const a = document.createElement('a');
      a.className = 'chart-card';
      a.href      = `chart.html?chart=${encodeURIComponent(chart.id)}`;
      a.innerHTML = `
        <button class="card-delete" title="Delete chart">×</button>
        <div class="card-icon">🏢</div>
        <h2>${esc(chart.name)}</h2>
        <p>${esc(chart.desc || 'Org Chart')}</p>
        <div class="arrow">→</div>
      `;

      // Delete card (without navigating)
      a.querySelector('.card-delete').addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        if (confirm(`Delete "${chart.name}"? This only removes it from this list — Google Sheet data is kept.`)) {
          const updated = getCharts().filter(c => c.id !== chart.id);
          saveCharts(updated);
          renderCharts();
        }
      });

      grid.insertBefore(a, newCard);
    });
  }

  function openNewModal() {
    document.getElementById('new-name').value = '';
    document.getElementById('new-desc').value = '';
    document.getElementById('new-url').value  = DEFAULT_URL;
    document.getElementById('modal').classList.add('show');
    setTimeout(() => document.getElementById('new-name').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }

  function createChart() {
    const name = document.getElementById('new-name').value.trim();
    const desc = document.getElementById('new-desc').value.trim();
    const url  = document.getElementById('new-url').value.trim();

    if (!name) { alert('Please enter a chart name.'); return; }
    if (!url || !url.includes('script.google.com')) {
      alert('Please enter a valid Google Apps Script URL.'); return;
    }

    const charts = getCharts();
    const id     = 'chart_' + Date.now();
    charts.push({ id, name, desc, url });
    saveCharts(charts);
    closeModal();

    // Navigate to new chart
    window.location.href = `chart.html?chart=${encodeURIComponent(id)}`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Close on overlay click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Enter key submits
  document.getElementById('modal').addEventListener('keydown', e => {
    if (e.key === 'Enter') createChart();
  });

  renderCharts();
</script>
</body>
</html>
