<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Org Chart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'DM Sans', sans-serif; background: #f7f5f0; padding: 0 0 80px; min-height: 100vh; overflow-x: auto; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; background: #fff;
    box-shadow: 0 1px 8px rgba(0,0,0,0.07);
    position: sticky; top: 0; z-index: 50; flex-wrap: wrap; gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .back-btn {
    text-decoration: none; color: #8a7e6e; font-size: 13px;
    display: flex; align-items: center; gap: 4px;
    transition: color 0.2s; white-space: nowrap;
  }
  .back-btn:hover { color: #2c2c2c; }
  .chart-title-wrap { display: flex; flex-direction: column; gap: 2px; }
  .chart-title-input {
    border: none; background: transparent;
    font-family: 'Playfair Display', serif; font-size: 20px; color: #2c2c2c;
    outline: none; border-bottom: 1px dashed transparent; transition: border-color 0.2s; min-width: 180px;
  }
  .chart-title-input:focus { border-bottom-color: #c9a96e; }
  .chart-subtitle-input {
    border: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 11px; color: #8a7e6e;
    outline: none; border-bottom: 1px dashed transparent; transition: border-color 0.2s; min-width: 140px;
  }
  .chart-subtitle-input:focus { border-bottom-color: #c9a96e; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn-pdf {
    background: #c9a96e; color: #fff; border: none; border-radius: 8px;
    padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-size: 12px;
    font-weight: 500; cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-pdf:hover { background: #b8944f; }
  .btn-pdf:disabled { opacity: 0.6; cursor: not-allowed; }

  .chart-area { padding: 48px 40px 60px; display: flex; flex-direction: column; align-items: center; }

  /* Nodes */
  .node {
    background: #fff; border-radius: 12px; padding: 14px 18px;
    min-width: 170px; max-width: 230px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .node.visionary  { border-top: 4px solid #c9a96e; min-width: 240px; }
  .node.integrator { border-top: 4px solid #7a9e87; min-width: 220px; }
  .node.department { border-top: 4px solid #7a8ea8; min-width: 190px; }
  .node.depth-1 { border-top: 4px solid #a87a8e; }
  .node.depth-2 { border-top: 4px solid #7a8ea8; }
  .node.depth-3 { border-top: 4px solid #7aaa8e; }
  .node.depth-4 { border-top: 4px solid #c9a96e; }
  .node.depth-5 { border-top: 4px solid #a8907a; }
  .node.depth-6 { border-top: 4px solid #8e7aa8; }

  .node-heading-input {
    width: 100%; border: none; border-bottom: 1px dashed transparent;
    background: transparent; font-family: 'Playfair Display', serif;
    font-size: 14px; color: #2c2c2c; text-align: center;
    outline: none; padding: 2px 4px; transition: border-color 0.2s; margin-bottom: 4px;
  }
  .node-heading-input:focus { border-bottom-color: #c9a96e; }
  .node-person-input {
    width: 100%; border: none; border-bottom: 1px dashed transparent;
    background: transparent; font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: #8a7e6e; text-align: center;
    outline: none; padding: 2px 4px; margin-bottom: 8px;
    transition: border-color 0.2s; font-style: italic;
  }
  .node-person-input:focus { border-bottom-color: #7a9e87; }
  .node-person-input::placeholder { color: #ccc; }

  .roles-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .role-item  { display: flex; align-items: center; gap: 5px; }
  .role-input {
    width: 100%; border: none; border-bottom: 1px dashed #d0c8bc;
    background: transparent; font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: #555; padding: 2px 4px;
    outline: none; transition: border-color 0.2s;
  }
  .role-input:focus { border-bottom-color: #c9a96e; color: #222; }
  .role-input::placeholder { color: #bbb; font-style: italic; }

  .add-role-btn {
    display: block; width: 100%; margin-top: 6px;
    background: none; border: 1px dashed #d0c8bc; border-radius: 6px;
    padding: 3px; font-size: 10px; color: #aaa; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .add-role-btn:hover { border-color: #c9a96e; color: #c9a96e; background: #fdf9f3; }
  .add-sg-btn {
    display: block; width: 100%; margin-top: 4px;
    background: none; border: 1px dashed #b8a0c0; border-radius: 6px;
    padding: 3px; font-size: 10px; color: #b8a0c0; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .add-sg-btn:hover { border-color: #a87a8e; color: #a87a8e; background: #fdf5f8; }
  .del-btn {
    background: none; border: none; color: #ddd; cursor: pointer;
    font-size: 13px; line-height: 1; padding: 0 2px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .del-btn:hover { color: #e07070; }
  .sg-header { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }

  .conn-v { width: 2px; background: #d5cfc6; flex-shrink: 0; }
  .conn-v.sm { height: 20px; }
  .conn-v.md { height: 28px; }
  .conn-h { height: 2px; background: #d5cfc6; }

  .h-row { display: flex; gap: 16px; align-items: flex-start; }
  .v-col { display: flex; flex-direction: column; align-items: center; }
  .dept-row-wrap { display: flex; flex-direction: column; align-items: center; }

  #status {
    position: fixed; bottom: 16px; right: 16px;
    font-size: 11px; font-family: 'DM Sans', sans-serif;
    padding: 6px 14px; border-radius: 20px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; color: #fff;
  }
  #status.show   { opacity: 1; }
  #status.saving { background: #c9a96e; }
  #status.saved  { background: #7a9e87; }
  #status.error  { background: #c97a7a; }

  #loading {
    position: fixed; inset: 0; background: #f7f5f0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; z-index: 100; transition: opacity 0.4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid #d5cfc6;
    border-top-color: #c9a96e; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 12px; color: #8a7e6e; letter-spacing: 0.1em; }

  @media print {
    .topbar, #status, .add-role-btn, .add-sg-btn, .del-btn { display: none !important; }
    body { background: #fff; padding: 0; }
    .chart-area { padding: 20px; }
    .node { box-shadow: none; border: 1px solid #e0dbd3; }
    .node-heading-input, .node-person-input, .role-input { border-bottom-color: transparent !important; }
  }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Loading chart…</p></div>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">← All Charts</a>
    <div class="chart-title-wrap">
      <input class="chart-title-input" id="chart-title" type="text" value="Organization Chart" placeholder="Chart name…" />
      <input class="chart-subtitle-input" id="chart-subtitle" type="text" placeholder="Subtitle or description…" />
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-pdf" onclick="exportPDF()">⬇ Export PDF</button>
  </div>
</div>

<div class="chart-area" id="chart-area">
  <div id="tree" style="display:flex;flex-direction:column;align-items:center;">

    <div class="v-col">
      <div class="node visionary">
        <input class="node-heading-input" id="heading-visionary" type="text" value="Visionary" placeholder="Heading…" />
        <input class="node-person-input"  id="person-visionary"  type="text" placeholder="Person's name…" />
        <ul class="roles-list" id="roles-visionary"></ul>
        <button class="add-role-btn" onclick="addRole('visionary')">+ Add Role</button>
        <button class="add-sg-btn"   onclick="addSubgroup('visionary',null,'','',[], true,1)">+ Add Subgroup</button>
      </div>
      <div class="conn-v sm" id="sgconn-visionary" style="display:none;"></div>
      <div class="dept-row-wrap" id="sgsection-visionary" style="display:none;">
        <div class="conn-h" id="sghbar-visionary"></div>
        <div class="h-row" id="sgcols-visionary"></div>
      </div>
    </div>

    <div class="conn-v md"></div>

    <div class="v-col">
      <div class="node integrator">
        <input class="node-heading-input" id="heading-integrator" type="text" value="Integrator" placeholder="Heading…" />
        <input class="node-person-input"  id="person-integrator"  type="text" placeholder="Person's name…" />
        <ul class="roles-list" id="roles-integrator"></ul>
        <button class="add-role-btn" onclick="addRole('integrator')">+ Add Role</button>
        <button class="add-sg-btn" onclick="addIntegratorSubgroup()">+ Add Dept-Level Subgroup</button>
      </div>
    </div>

    <div class="conn-v md"></div>

    <div class="dept-row-wrap">
      <div class="conn-h" id="dept-hbar"></div>
      <div class="h-row" id="dept-columns"></div>
    </div>

  </div>
</div>

<div id="status"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
  // ── Config — hardcoded, works on any browser ──────────
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzu7aCDAfUvVV-EgQcBw4WHN6YMCgm4Jyca5YH72TxpkBQrSCIw-coPpma9pETp_1ULtg/exec';
  const params   = new URLSearchParams(window.location.search);
  const CHART_ID = params.get('id')   || '';
  const CHART_NAME = decodeURIComponent(params.get('name') || 'Organization Chart');

  document.getElementById('chart-title').value = CHART_NAME;
  document.title = CHART_NAME + ' — Org Chart';

  const DEPT_DEFS = [
    { id: 'sales',   label: 'Sales / Marketing' },
    { id: 'ops',     label: 'Operations / Product' },
    { id: 'finance', label: 'Finance' },
    { id: 'hr',      label: 'HR' },
  ];

  const DEPTH_COLORS = ['#a87a8e','#7a8ea8','#7aaa8e','#c9a96e','#a8907a','#8e7aa8'];

  const defaultRoles = {
    visionary:  ['Chief Executive Officer','Chief Strategy Officer'],
    integrator: ['Chief Operating Officer'],
    sales:      ['Sales Director','Marketing Manager'],
    ops:        ['Product Manager','Operations Lead'],
    finance:    ['CFO','Financial Analyst'],
    hr:         ['HR Director','Recruiter'],
  };

  const deptColumnsEl = document.getElementById('dept-columns');
  const deptHBar      = document.getElementById('dept-hbar');
  const statusEl      = document.getElementById('status');
  const loadingEl     = document.getElementById('loading');
  let saveTimer = null;
  let sgCounter = 0;

  // ── Build dept columns ────────────────────────────────
  DEPT_DEFS.forEach(dept => {
    const col = document.createElement('div');
    col.className = 'v-col'; col.id = 'deptcol-' + dept.id;
    col.innerHTML = `
      <div class="conn-v sm"></div>
      <div class="node department">
        <input class="node-heading-input" id="heading-${dept.id}" type="text" value="${dept.label}" placeholder="Heading…" />
        <input class="node-person-input"  id="person-${dept.id}"  type="text" placeholder="Person's name…" />
        <ul class="roles-list" id="roles-${dept.id}"></ul>
        <button class="add-role-btn" onclick="addRole('${dept.id}')">+ Add Role</button>
        <button class="add-sg-btn"   onclick="addSubgroup('${dept.id}',null,'','',[], true,1)">+ Add Subgroup</button>
      </div>
      <div class="conn-v sm" id="sgconn-${dept.id}" style="display:none;"></div>
      <div class="dept-row-wrap" id="sgsection-${dept.id}" style="display:none;">
        <div class="conn-h" id="sghbar-${dept.id}"></div>
        <div class="h-row" id="sgcols-${dept.id}"></div>
      </div>
    `;
    deptColumnsEl.appendChild(col);
  });

  // Attach save listeners to fixed inputs
  ['chart-title','chart-subtitle',
   'heading-visionary','person-visionary',
   'heading-integrator','person-integrator',
   ...DEPT_DEFS.flatMap(d => ['heading-'+d.id,'person-'+d.id])
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.addEventListener('input', scheduleSave); el.addEventListener('blur', scheduleSave); }
  });

  // ── Helpers ───────────────────────────────────────────
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function depthColor(d) { return DEPTH_COLORS[(d-1) % DEPTH_COLORS.length]; }
  function showStatus(msg, type, duration=2000) {
    statusEl.textContent = msg; statusEl.className = `show ${type}`;
    clearTimeout(statusEl._t);
    if (duration) statusEl._t = setTimeout(() => statusEl.className='', duration);
  }

  // ── Roles ─────────────────────────────────────────────
  function addRole(sectionId, value='', andSave=true) {
    const list = document.getElementById('roles-'+sectionId);
    if (!list) return;
    const li  = document.createElement('li'); li.className='role-item';
    const inp = document.createElement('input');
    inp.className='role-input'; inp.type='text'; inp.value=value; inp.placeholder='Enter role…';
    inp.addEventListener('input', scheduleSave); inp.addEventListener('blur', scheduleSave);
    const del = document.createElement('button');
    del.className='del-btn'; del.textContent='×'; del.title='Remove';
    del.addEventListener('click', ()=>{ li.remove(); scheduleSave(); });
    li.appendChild(inp); li.appendChild(del); list.appendChild(li);
    if (andSave) scheduleSave();
  }

  // ── Integrator dept-level subgroup (appears in dept row) ───
  function addIntegratorSubgroup(sgId=null, sgName='', sgPerson='', roles=[], andSave=true) {
    // Add a new column to the dept-columns row, just like a department
    const colsEl = document.getElementById('dept-columns');
    const uid    = sgId || ('isg_'+Date.now()+'_'+(++sgCounter));
    const color  = '#7a9e87'; // same green as integrator

    const col = document.createElement('div');
    col.className = 'v-col'; col.id = 'deptcol-'+uid;
    col.innerHTML = `
      <div class="conn-v sm"></div>
      <div class="node department" style="border-top-color:${color}">
        <div class="sg-header">
          <input class="node-heading-input" id="heading-${uid}" type="text"
            value="${esc(sgName)}" placeholder="Subgroup name…" />
          <button class="del-btn" id="sgdel-${uid}" title="Delete">×</button>
        </div>
        <input class="node-person-input" id="person-${uid}" type="text"
          value="${esc(sgPerson)}" placeholder="Person's name…" />
        <ul class="roles-list" id="roles-${uid}"></ul>
        <button class="add-role-btn" onclick="addRole('${uid}')">+ Add Role</button>
        <button class="add-sg-btn"   onclick="addSubgroup('${uid}',null,'','',[], true,1)">+ Add Subgroup</button>
      </div>
      <div class="conn-v sm" id="sgconn-${uid}" style="display:none;"></div>
      <div class="dept-row-wrap" id="sgsection-${uid}" style="display:none;">
        <div class="conn-h" id="sghbar-${uid}"></div>
        <div class="h-row" id="sgcols-${uid}"></div>
      </div>
    `;

    col.querySelector('#sgdel-'+uid).addEventListener('click', () => {
      col.remove();
      setTimeout(updateDeptHBar, 50);
      scheduleSave();
    });
    ['heading-'+uid,'person-'+uid].forEach(id => {
      const el = col.querySelector('#'+id);
      if (el) { el.addEventListener('input', scheduleSave); el.addEventListener('blur', scheduleSave); }
    });

    colsEl.appendChild(col);
    roles.forEach(r => addRole(uid, r, false));
    setTimeout(updateDeptHBar, 50);
    if (andSave) scheduleSave();
    return uid;
  }

  // ── Subgroups ─────────────────────────────────────────────
  function addSubgroup(parentId, sgId=null, sgName='', sgPerson='', roles=[], andSave=true, depth=1) {
    const colsEl    = document.getElementById('sgcols-'+parentId);
    const sectionEl = document.getElementById('sgsection-'+parentId);
    const connEl    = document.getElementById('sgconn-'+parentId);
    if (!colsEl) return null;

    const uid        = sgId || ('sg_'+(++sgCounter)+'_'+Date.now());
    const color      = depthColor(depth);
    const depthClass = 'depth-'+((((depth-1)%6)+1));

    if (sectionEl) sectionEl.style.display = 'flex';
    if (connEl)    connEl.style.display    = 'block';

    const col = document.createElement('div');
    col.className = 'v-col'; col.id = 'sgcol-'+uid;
    col.innerHTML = `
      <div class="conn-v sm"></div>
      <div class="node ${depthClass}" style="border-top-color:${color}">
        <div class="sg-header">
          <input class="node-heading-input" id="heading-${uid}" type="text"
            value="${esc(sgName)}" placeholder="Subgroup name…" style="font-size:13px;" />
          <button class="del-btn" id="sgdel-${uid}" title="Delete">×</button>
        </div>
        <input class="node-person-input" id="person-${uid}" type="text"
          value="${esc(sgPerson)}" placeholder="Person's name…" />
        <ul class="roles-list" id="roles-${uid}"></ul>
        <button class="add-role-btn" onclick="addRole('${uid}')">+ Add Role</button>
        <button class="add-sg-btn"   onclick="addSubgroup('${uid}',null,'','',[], true,${depth+1})">+ Add Subgroup</button>
      </div>
      <div class="conn-v sm" id="sgconn-${uid}" style="display:none;"></div>
      <div class="dept-row-wrap" id="sgsection-${uid}" style="display:none;">
        <div class="conn-h" id="sghbar-${uid}"></div>
        <div class="h-row" id="sgcols-${uid}"></div>
      </div>
    `;

    col.querySelector('#sgdel-'+uid).addEventListener('click', () => {
      col.remove();
      updateHBar(parentId);
      if (colsEl.querySelectorAll(':scope > .v-col').length === 0) {
        if (sectionEl) sectionEl.style.display = 'none';
        if (connEl)    connEl.style.display    = 'none';
      }
      scheduleSave();
    });
    ['heading-'+uid,'person-'+uid].forEach(id => {
      const el = col.querySelector('#'+id);
      if (el) { el.addEventListener('input', scheduleSave); el.addEventListener('blur', scheduleSave); }
    });

    colsEl.appendChild(col);
    roles.forEach(r => addRole(uid, r, false));
    updateHBar(parentId);
    if (andSave) scheduleSave();
    return uid;
  }

  function updateHBar(parentId) {
    const colsEl = document.getElementById('sgcols-'+parentId);
    const hbarEl = document.getElementById('sghbar-'+parentId);
    if (!colsEl || !hbarEl) return;
    const cols = colsEl.querySelectorAll(':scope > .v-col');
    if (cols.length === 0) { hbarEl.style.width='0'; return; }
    if (cols.length === 1) { hbarEl.style.width='2px'; hbarEl.style.marginLeft=''; return; }
    requestAnimationFrame(() => {
      const first  = cols[0].getBoundingClientRect();
      const last   = cols[cols.length-1].getBoundingClientRect();
      const parent = colsEl.getBoundingClientRect();
      const left   = first.left + first.width/2 - parent.left;
      const right  = last.left  + last.width/2  - parent.left;
      hbarEl.style.width      = Math.max(0, right-left)+'px';
      hbarEl.style.marginLeft = left+'px';
    });
  }

  function updateDeptHBar() {
    const cols = deptColumnsEl.querySelectorAll(':scope > .v-col');
    if (cols.length < 2) return;
    const first  = cols[0].getBoundingClientRect();
    const last   = cols[cols.length-1].getBoundingClientRect();
    const parent = deptColumnsEl.getBoundingClientRect();
    const left   = first.left + first.width/2 - parent.left;
    const right  = last.left  + last.width/2  - parent.left;
    deptHBar.style.width      = (right-left)+'px';
    deptHBar.style.marginLeft = left+'px';
  }

  // ── Save ──────────────────────────────────────────────
  function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveData, 900); }

  function collectRows() {
    const rows = [];
    const TOP_SECTIONS = ['visionary','integrator',...DEPT_DEFS.map(d=>d.id)];

    rows.push({
      type:'meta', section:'', parentsg:'', sgid:'', sgname:'', sgperson:'', role:'', depth:0,
      chartTitle:    document.getElementById('chart-title').value,
      chartSubtitle: document.getElementById('chart-subtitle').value,
      chartId: CHART_ID,
    });

    TOP_SECTIONS.forEach(id => {
      rows.push({
        type:'node', section:id, parentsg:'', sgid:'',
        sgname:   document.getElementById('heading-'+id)?.value || '',
        sgperson: document.getElementById('person-'+id)?.value  || '',
        role:'', depth:0, chartTitle:'', chartSubtitle:'', chartId: CHART_ID,
      });
      document.querySelectorAll(`#roles-${id} > .role-item .role-input`).forEach(inp => {
        const v = inp.value.trim();
        if (v) rows.push({ type:'role', section:id, parentsg:'', sgid:'', sgname:'', sgperson:'', role:v, depth:0, chartTitle:'', chartSubtitle:'', chartId: CHART_ID });
      });
    });

    function walkSG(parentId, depth) {
      const colsEl = document.getElementById('sgcols-'+parentId);
      if (!colsEl) return;
      colsEl.querySelectorAll(':scope > .v-col').forEach(col => {
        const uid      = col.id.replace('sgcol-','');
        const sgName   = document.getElementById('heading-'+uid)?.value.trim() || '';
        const sgPerson = document.getElementById('person-'+uid)?.value.trim()  || '';
        rows.push({ type:'sg', section:parentId, parentsg:parentId, sgid:uid, sgname:sgName, sgperson:sgPerson, role:'', depth, chartTitle:'', chartSubtitle:'', chartId: CHART_ID });
        document.querySelectorAll(`#roles-${uid} > .role-item .role-input`).forEach(inp => {
          const v = inp.value.trim();
          if (v) rows.push({ type:'sgrole', section:parentId, parentsg:parentId, sgid:uid, sgname:sgName, sgperson:sgPerson, role:v, depth, chartTitle:'', chartSubtitle:'', chartId: CHART_ID });
        });
        walkSG(uid, depth+1);
      });
    }
    // Walk dept-level integrator subgroups (isg_ prefix)
    document.querySelectorAll('#dept-columns > .v-col').forEach(col => {
      const uid = col.id.replace('deptcol-','');
      if (!uid.startsWith('isg_')) return;
      const sgName   = document.getElementById('heading-'+uid)?.value.trim() || '';
      const sgPerson = document.getElementById('person-'+uid)?.value.trim()  || '';
      rows.push({ type:'idsg', section:'integrator', parentsg:'integrator', sgid:uid, sgname:sgName, sgperson:sgPerson, role:'', depth:0, chartTitle:'', chartSubtitle:'', chartId: CHART_ID });
      document.querySelectorAll(`#roles-${uid} > .role-item .role-input`).forEach(inp => {
        const v = inp.value.trim();
        if (v) rows.push({ type:'idsgrole', section:'integrator', parentsg:'integrator', sgid:uid, sgname:sgName, sgperson:sgPerson, role:v, depth:0, chartTitle:'', chartSubtitle:'', chartId: CHART_ID });
      });
      walkSG(uid, 1);
    });
    ['visionary','integrator',...DEPT_DEFS.map(d=>d.id)].forEach(id => walkSG(id, 1));
    return rows;
  }

  async function saveData() {
    showStatus('Saving…','saving',0);
    try {
      await fetch(SCRIPT_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'save', chartId: CHART_ID, data: collectRows() }),
      });
      showStatus('✓ Saved','saved',2000);
    } catch(e) { showStatus('⚠ Save failed','error',3000); }
  }

  // ── Load ──────────────────────────────────────────────
  async function loadData() {
    try {
      const res  = await fetch(`${SCRIPT_URL}?chartId=${encodeURIComponent(CHART_ID)}&t=${Date.now()}`);
      const json = await res.json();
      const rows = json.rows || [];

      if (rows.length === 0) {
        Object.entries(defaultRoles).forEach(([id,roles]) => roles.forEach(r => addRole(id, r, false)));
        saveData();
      } else {
        const meta = rows.find(r => r.type==='meta');
        if (meta) {
          if (meta.chartTitle)    document.getElementById('chart-title').value    = meta.chartTitle;
          if (meta.chartSubtitle) document.getElementById('chart-subtitle').value = meta.chartSubtitle;
          if (meta.chartTitle)    document.title = meta.chartTitle + ' — Org Chart';
        }

        rows.filter(r => r.type==='node').forEach(r => {
          const hEl = document.getElementById('heading-'+r.section);
          const pEl = document.getElementById('person-'+r.section);
          if (hEl) hEl.value = r.sgname   || '';
          if (pEl) pEl.value = r.sgperson || '';
        });

        rows.filter(r => r.type==='role').forEach(({ section, role }) => {
          if (role && document.getElementById('roles-'+section)) addRole(section, role, false);
        });

        const sgRows = rows.filter(r => r.type==='sg'||r.type==='sgrole');
        const sgMap  = new Map();
        sgRows.forEach(r => {
          if (!sgMap.has(r.sgid)) sgMap.set(r.sgid, { parentsg:r.parentsg, sgid:r.sgid, sgname:r.sgname, sgperson:r.sgperson, depth:r.depth, roles:[] });
          if (r.role) sgMap.get(r.sgid).roles.push(r.role);
        });

        const childrenOf = {};
        sgMap.forEach(sg => {
          if (!childrenOf[sg.parentsg]) childrenOf[sg.parentsg] = [];
          childrenOf[sg.parentsg].push(sg);
        });

        function renderChildren(parentId, depth) {
          (childrenOf[parentId]||[]).forEach(sg => {
            addSubgroup(parentId, sg.sgid, sg.sgname, sg.sgperson, sg.roles, false, depth);
            renderChildren(sg.sgid, depth+1);
          });
        }
        // Restore integrator dept-level subgroups
        rows.filter(r => r.type==='idsg'||r.type==='idsgrole').forEach(r => {
          if (!sgMap.has(r.sgid)) sgMap.set(r.sgid, { parentsg:'idept', sgid:r.sgid, sgname:r.sgname, sgperson:r.sgperson, depth:0, roles:[], isIdsg:true });
          if (r.role) sgMap.get(r.sgid).roles.push(r.role);
        });
        const idsgEntries = [...sgMap.values()].filter(sg => sg.isIdsg);
        idsgEntries.forEach(sg => {
          const uid = addIntegratorSubgroup(sg.sgid, sg.sgname, sg.sgperson, sg.roles, false);
          renderChildren(uid, 1);
        });

        ['visionary','integrator',...DEPT_DEFS.map(d=>d.id)].forEach(id => renderChildren(id, 1));
      }

    } catch(e) {
      Object.entries(defaultRoles).forEach(([id,roles]) => roles.forEach(r => addRole(id, r, false)));
      showStatus('⚠ Could not load data','error',4000);
    }

    loadingEl.classList.add('hidden');
    setTimeout(() => {
      updateDeptHBar();
      ['visionary','integrator',...DEPT_DEFS.map(d=>d.id)].forEach(id => updateHBar(id));
    }, 150);
  }

  // ── PDF Export ────────────────────────────────────────
  async function exportPDF() {
    const btn = document.querySelector('.btn-pdf');
    btn.textContent = '⏳ Generating…'; btn.disabled = true;

    document.querySelectorAll('.add-role-btn,.add-sg-btn,.del-btn').forEach(el => el.style.visibility='hidden');
    const topbar = document.querySelector('.topbar');
    topbar.style.position = 'relative';
    window.scrollTo(0,0);
    document.body.style.overflow = 'visible';
    await new Promise(r => setTimeout(r, 300));

    const canvas = await html2canvas(document.body, {
      scale: 2, backgroundColor: '#f7f5f0', useCORS: true, allowTaint: true,
      scrollX: 0, scrollY: 0,
      windowWidth: document.body.scrollWidth,
      windowHeight: document.body.scrollHeight,
      width: document.body.scrollWidth,
      height: document.body.scrollHeight,
    });

    document.querySelectorAll('.add-role-btn,.add-sg-btn,.del-btn').forEach(el => el.style.visibility='');
    topbar.style.position = 'sticky';
    document.body.style.overflow = '';

    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/png');
    const pdfW    = canvas.width  * 0.264583;
    const pdfH    = canvas.height * 0.264583;
    const pdf     = new jsPDF({ orientation: pdfW > pdfH ? 'l':'p', unit:'mm', format:[pdfW,pdfH] });
    pdf.addImage(imgData,'PNG',0,0,pdfW,pdfH);

    const title    = document.getElementById('chart-title').value || 'Org Chart';
    const filename = title.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.pdf';
    pdf.save(filename);

    btn.textContent = '⬇ Export PDF'; btn.disabled = false;
  }

  window.addEventListener('resize', () => {
    updateDeptHBar();
    document.querySelectorAll('[id^="sghbar-"]').forEach(el => updateHBar(el.id.replace('sghbar-','')));
  });

  loadData();
</script>
